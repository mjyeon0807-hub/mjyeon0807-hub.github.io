###########################################################
### Beautiful Jekyll - MXC Lab configuration
###########################################################

############################
# --- Required options --- #
############################

title: "YEON LAB"
author: "YEON LAB"

# For GitHub Pages user site: https://mjyeon0807-hub.github.io
url: "https://mjyeon0807-hub.github.io"
baseurl: ""

###############################################
# --- List of links in the navigation bar --- #
###############################################

navbar-links:
  Home: "/"
  Team: "team"
  Research:
    - "Research Theme": "research"
    - "Today's Paper": "todays-paper"
    - "Wiki": "wiki"
  Publications: "publications"
  News: "news"
  Contact: "contact"

#####################################
# --- Footer social media links --- #
#####################################

social-network-links:
  email: "mjyeon@chungbuk.ac.kr"
  rss: false
#  github: ""
#  twitter: ""
  linkedin: "minjeongyeon"
  google-scholar: "H9L46kUAAAAJ&hl=en&oi=ao"
  instagram: "mic_lab2026"

rss-description: "Updates and news from the Lab of Molecular and Cellular Crosstalk (MXC)."

#####################################################
# --- Comments on "Today's Paper" posts (giscus) --- #
#####################################################
# giscus turns GitHub Discussions into a comment widget, active since 2026-07-02.
# New Discussions are created in the "Ideas" category. To change the category,
# pick a new one at https://giscus.app (repo must already have Discussions enabled)
# and update category/category-id below.
giscus:
  repository: "mjyeon0807-hub/mjyeon0807-hub.github.io"
  repository-id: "R_kgDORONe1Q"
  category: "Ideas"
  category-id: "DIC_kwDORONe1c4DAVNv"
  mapping: "pathname"
  hostname: "giscus.app"
  reactions-enabled: "1"
  emit-metadata: "0"
  theme: "light"
  lang: "ko"

###########################
# --- General options --- #
###########################

share-links-active:
  twitter: false
  facebook: false
  linkedin: false
  vk: false
  reddit: false

url-pretty: "mjyeon0807-hub.github.io"
title-on-all-pages: true

excerpt_length: 50
feed_show_excerpt: true
feed_show_tags: true

post_search: false
edit_page_button: false
navbar-var-length: false

keywords: "MXC, Lab of Molecular and Cellular Crosstalk, Chungbuk National University, College of Medicine, tumor microenvironment, extracellular vesicles, cancer immunology, mitochondria fitness"

######################################
# --- Colours / background image --- #
######################################

page-col: "#FFFFFF"
text-col: "#404040"
link-col: "#008AFF"
hover-col: "#0085A1"
navbar-col: "#FFFFFF"
navbar-text-col: "#404040"
navbar-border-col: "#E6E6E6"
footer-col: "#EAEAEA"
footer-text-col: "#777777"
footer-link-col: "#404040"
footer-hover-col: "#0085A1"

################
# --- Misc --- #
################

date_format: "%B %-d, %Y"

#################################################################################
# --- You don't need to touch anything below here (but you can if you want) --- #
#################################################################################

timezone: "Asia/Seoul"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 5

kramdown:
  input: GFM

collections:
  news:
    output: true
    permalink: /news/:name/
  glossary:
    output: true
    permalink: /wiki/:slug/
  papers:
    output: true
    permalink: /papers/:name/

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: false
      social-share: false
  -
    scope:
      path: ""
      type: "news"
    values:
      layout: "post"
      comments: false
      social-share: false
      css:
        - "/assets/css/news-detail.css"
  -
    scope:
      path: ""
      type: "glossary"
    values:
      layout: "glossary-term"
      comments: false
      social-share: false
      css:
        - "/assets/css/wiki.css"
  -
    scope:
      path: ""
      type: "papers"
    values:
      layout: "paper-post"
      comments: true
      social-share: false
      css:
        - "/assets/css/paper.css"
  -
    scope:
      path: ""
    values:
      layout: "page"

exclude:
  - CHANGELOG.md
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - screenshot.png
  - docs/

plugins:
  - jekyll-paginate
  - jekyll-sitemap

site-css:
  - "/assets/css/custom.css"
  - "/assets/css/team.css"
