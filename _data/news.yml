- title: "세포내외 분자 커뮤니케이션 연구실 런칭"
  date: 2026-03-01
  description: "연구실 이름을 세포내외 분자 커뮤니케이션 연구실 (Molecular Intra/Intercellular Communication Laboratory, MICL)로 정하였습니다. Microphone(MIC)이 작은 소리를 크게 증폭시키는 역할을 하는 것처럼 저희 연구실에서 수행되는 연구들이 생명과학의 발전과 인류의 건강에 기여할 수 있기를 소망하며 명명하였습니다. 열심히 나아가겠습니다! 앞으로 많은 관심과 응원 부탁드리겠습니다!"
  image: "/assets/img/MICL.png"
  tags:
    - New
    

- title: "연민정 교수, 충북대학교 의과대학 생화학교실 조교수 임용"
  date: 2026-03-01
  description: "연민정 박사가 충북대학교 의과대학 생화학교실 조교수로 임용되었습니다. 종양 미세환경 (Tumor microenvironment), 세포외소포체 (Extracellular Vesicles), 미토콘드리아 항상성 (Mitochondria fitness)을 주제로 활발한 연구를 수행할 예정입니다. 많은 관심과 응원 부탁드리겠습니다!"
  link: "https://www.veritas-a.com/news/articleView.html?idxno=599756"
