- title: "연민정 교수, 충북대학교 의과대학 생화학교실 조교수 임용"
  date: 2026-03-01
  description: "연민정 박사가 충북대학교 의과대학 생화학교실 조교수로 임용되었습니다. 종양 미세환경 (Tumor microenvironment), 세포외소포체 (Extracellular Vesicles), 미토콘드리아 항상성 (Mitochondria fitness)을 주제로 세포내외 분자 커뮤니케이션 연구실 (Molecular Intra/Intercellular Communication Laboratory, MICL)을 이끌며 활발한 연구를 수행할 예정입니다. 많은 관심과 응원 부탁드리겠습니다!"
  link: "https://www.veritas-a.com/news/articleView.html?idxno=599756"
